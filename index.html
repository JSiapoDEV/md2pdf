<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD2PDF — Markdown to PDF Converter</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24' viewBox='0 0 24 24' fill='none' stroke='%23f0883e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'><path d='M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z'/><polyline points='14 2 14 8 20 8'/><line x1='16' y1='13' x2='8' y2='13'/><line x1='16' y1='17' x2='8' y2='17'/><polyline points='10 9 9 9 8 9'/></svg>">

    <!-- SEO & AI Discoverability -->
    <meta name="description" content="Free online tool to convert Markdown (.md) files to beautifully styled PDFs and HTML. 11 visual styles (Notion, GitHub, LaTeX, Dracula, Terminal & more), custom CSS, templates, syntax highlighting, dark mode. No signup — runs in your browser.">
    <meta name="keywords" content="markdown to pdf, md to pdf, markdown converter, github markdown, markdown editor, pdf export, html export, notion style, latex style, dracula theme, free tool">
    <meta name="author" content="JSiapoDev">
    <link rel="canonical" href="https://md2pdf.studio/">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://md2pdf.studio/">
    <meta property="og:title" content="MD2PDF — Convert Markdown to PDF with 11 Styles">
    <meta property="og:description" content="Free tool to convert Markdown to styled PDFs and HTML. 11 visual styles, custom CSS, templates, syntax highlighting, dark mode. No signup required.">
    <meta property="og:image" content="https://md2pdf.studio/icon.svg">
    <meta property="og:site_name" content="MD2PDF">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary">
    <meta name="twitter:title" content="MD2PDF — Markdown to PDF with 11 Styles">
    <meta name="twitter:description" content="Free tool to convert Markdown to styled PDFs and HTML. 11 styles, custom CSS, templates, syntax highlighting. Runs in your browser.">
    <meta name="twitter:image" content="https://md2pdf.studio/icon.svg">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "MD2PDF",
      "url": "https://md2pdf.studio",
      "description": "Free online tool to convert Markdown (.md) files to beautifully styled PDFs and HTML with 11 visual styles, custom CSS, and document templates.",
      "applicationCategory": "UtilitiesApplication",
      "operatingSystem": "Any",
      "browserRequirements": "Requires a modern web browser",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
      "author": {
        "@type": "Person",
        "name": "JSiapoDev",
        "url": "https://jsiapo.dev",
        "sameAs": ["https://github.com/JSiapoDEV","https://www.linkedin.com/in/jsiapo/"]
      },
      "featureList": ["Live Markdown preview","GitHub-flavored Markdown","Syntax highlighting for 180+ languages","PDF export","HTML export","11 visual styles (Notion, GitHub, Minimal, Academic, Corporate, LaTeX, Dracula, Newspaper, Handwritten, Terminal, Pastel)","Custom CSS injection","5 document templates","Dark and light theme","Drag and drop file upload","Auto-save drafts","Word count and reading time","Split and preview-only view modes"]
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- GitHub Markdown CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-dark.min.css" id="md-css-dark">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/github-markdown-css/5.5.1/github-markdown-light.min.css" id="md-css-light" disabled>

    <!-- Highlight.js themes -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="hljs-css-dark">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="hljs-css-light" disabled>

    <!-- App styles -->
    <link rel="stylesheet" href="style.css">

    <!-- Dynamic style overrides (set by JS) -->
    <style id="style-override"></style>
    <style id="custom-css-override"></style>
</head>
<body>
    <div class="app">
        <!-- Toolbar -->
        <header class="toolbar">
            <div class="toolbar-section toolbar-left">
                <div class="logo">
                    <svg class="logo-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                        <polyline points="14 2 14 8 20 8"/>
                        <line x1="16" y1="13" x2="8" y2="13"/>
                        <line x1="16" y1="17" x2="8" y2="17"/>
                        <polyline points="10 9 9 9 8 9"/>
                    </svg>
                    <span class="logo-text">MD<span class="logo-accent">2</span>PDF</span>
                </div>
            </div>

            <div class="toolbar-section toolbar-center">
                <span class="file-name" id="fileName">untitled.md</span>
            </div>

            <div class="toolbar-section toolbar-right">
                <!-- View toggle -->
                <div class="view-toggle" id="viewToggle" title="Toggle view mode">
                    <button class="view-btn active" data-view="split" aria-label="Split view">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="12" y1="3" x2="12" y2="21"/></svg>
                    </button>
                    <button class="view-btn" data-view="preview" aria-label="Preview only">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    </button>
                </div>

                <button class="btn btn-ghost" id="fullscreenBtn" title="Fullscreen (F11)" aria-label="Fullscreen">
                    <svg class="icon-expand" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                    <svg class="icon-compress" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="14" y1="10" x2="21" y2="3"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
                </button>

                <button class="btn btn-ghost" id="themeToggle" title="Toggle theme (Ctrl+Shift+L)" aria-label="Toggle theme">
                    <svg class="icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <svg class="icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>

                <!-- Export dropdown -->
                <div class="dropdown" id="exportDropdown">
                    <button class="btn btn-primary" id="exportBtn" title="Export">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
                        </svg>
                        <span>Export</span>
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    <div class="dropdown-menu">
                        <button class="dropdown-item" id="exportPDFBtn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                            Export PDF
                        </button>
                        <button class="dropdown-item" id="exportHTMLBtn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
                            Export HTML
                        </button>
                        <button class="dropdown-item" id="exportImageBtn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            Export Image
                        </button>
                        <div class="dropdown-divider"></div>
                        <button class="dropdown-item" id="shareBtn">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
                            Share Link
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Workspace -->
        <main class="workspace">
            <!-- Editor Pane -->
            <section class="pane editor-pane" id="editorPane">
                <div class="pane-header">
                    <span class="pane-label">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/>
                        </svg>
                        Markdown
                    </span>
                    <div class="pane-actions">
                        <span class="counter" id="counter">0 words</span>

                        <!-- Templates dropdown -->
                        <div class="dropdown" id="templatesDropdown">
                            <button class="btn btn-ghost btn-sm" title="Templates">
                                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
                                Templates
                            </button>
                            <div class="dropdown-menu dropdown-menu-wide">
                                <button class="dropdown-item" data-template="blank">Blank document</button>
                                <div class="dropdown-divider"></div>
                                <button class="dropdown-item" data-template="cv">CV / Resume</button>
                                <button class="dropdown-item" data-template="report">Report</button>
                                <button class="dropdown-item" data-template="docs">Documentation</button>
                                <button class="dropdown-item" data-template="changelog">Changelog</button>
                                <button class="dropdown-item" data-template="meeting">Meeting Notes</button>
                            </div>
                        </div>

                        <button class="btn btn-ghost btn-sm" id="uploadBtn" title="Upload .md file">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
                            </svg>
                            Upload
                        </button>
                    </div>
                </div>
                <!-- Find & Replace -->
                <div class="find-panel" id="findPanel">
                    <div class="find-row">
                        <input type="text" id="findInput" placeholder="Find..." class="find-input" autocomplete="off">
                        <span class="find-count" id="findCount"></span>
                        <button class="find-btn" id="findPrevBtn" title="Previous (Shift+Enter)">&#9650;</button>
                        <button class="find-btn" id="findNextBtn" title="Next (Enter)">&#9660;</button>
                        <button class="find-btn" id="replaceToggleBtn" title="Toggle replace (Ctrl+H)">&#8596;</button>
                        <button class="find-btn" id="findCloseBtn" title="Close (Esc)">&#10005;</button>
                    </div>
                    <div class="replace-row" id="replaceRow">
                        <input type="text" id="replaceInput" placeholder="Replace..." class="find-input" autocomplete="off">
                        <button class="find-btn find-btn-text" id="replaceBtn">Replace</button>
                        <button class="find-btn find-btn-text" id="replaceAllBtn">All</button>
                    </div>
                </div>

                <div class="editor-container" id="dropZone">
                    <textarea id="editor" spellcheck="false" placeholder="Write or drop your Markdown here..."></textarea>
                    <div class="drop-overlay" id="dropOverlay">
                        <div class="drop-content">
                            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
                            </svg>
                            <p>Drop your <strong>.md</strong> file here</p>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Resize Handle -->
            <div class="resize-handle" id="resizeHandle">
                <div class="resize-line"></div>
            </div>

            <!-- Preview Pane -->
            <section class="pane preview-pane" id="previewPane">
                <div class="pane-header">
                    <span class="pane-label">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                        Preview
                    </span>
                    <div class="pane-actions">
                        <select class="style-select" id="styleSelect" title="Preview style">
                            <option value="notion">Notion</option>
                            <option value="github">GitHub</option>
                            <option value="minimal">Minimal</option>
                            <option value="academic">Academic</option>
                            <option value="corporate">Corporate</option>
                            <option value="latex">LaTeX</option>
                            <option value="dracula">Dracula</option>
                            <option value="newspaper">Newspaper</option>
                            <option value="handwritten">Handwritten</option>
                            <option value="terminal">Terminal</option>
                            <option value="pastel">Pastel</option>
                        </select>
                        <button class="btn btn-ghost btn-sm" id="customCSSToggle" title="Custom CSS">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M4 12h16M4 17h10"/></svg>
                            CSS
                        </button>
                    </div>
                </div>
                <!-- Custom CSS Panel -->
                <div class="custom-css-panel" id="customCSSPanel">
                    <textarea id="customCSS" spellcheck="false" placeholder="/* Custom CSS — applied to preview & PDF */

/* Example: colored headings */
.markdown-body h1, .markdown-body h2 {
  color: #6366f1;
}

/* Example: rounded code blocks */
.markdown-body pre {
  border-radius: 16px;
}"></textarea>
                </div>
                <div class="preview-container">
                    <article class="markdown-body" id="preview"></article>
                </div>
            </section>
        </main>

        <!-- Footer -->
        <footer class="app-footer">
            <span class="footer-brand">Built by <a href="https://jsiapo.dev" target="_blank" rel="noopener">JSiapoDev</a></span>
            <div class="footer-links">
                <a href="https://github.com/JSiapoDEV/md2pdf" target="_blank" rel="noopener" class="star-link" title="Star on GitHub">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                    Star on GitHub
                </a>
                <a href="https://jsiapo.dev" target="_blank" rel="noopener" title="Portfolio" aria-label="Portfolio">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
                </a>
                <a href="https://www.linkedin.com/in/jsiapo/" target="_blank" rel="noopener" title="LinkedIn" aria-label="LinkedIn">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
                </a>
            </div>
        </footer>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" accept=".md,.markdown,.txt,.mdx" hidden>

    <!-- Export loading overlay -->
    <div class="export-overlay" id="exportOverlay">
        <div class="export-modal">
            <div class="export-spinner"></div>
            <p>Generating PDF...</p>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span id="toastMessage"></span>
    </div>

    <!-- WebMCP: Declarative forms for AI agents -->
    <form id="wmcpConvert"
          toolname="convert-markdown"
          tooldescription="Convert markdown text to a styled document. Paste markdown content, optionally choose a visual style, then submit to render. Use the export tools to download as PDF, HTML, or image."
          toolautosubmit="true"
          hidden>
        <textarea name="markdown"
                  toolparamtitle="Markdown Content"
                  toolparamdescription="The markdown text to render. Supports GitHub-flavored Markdown: headings, lists, tables, code blocks with syntax highlighting, task lists, blockquotes, images, links."></textarea>
        <select name="style"
                toolparamtitle="Document Style"
                toolparamdescription="Visual style for the document. Default: notion. Options: notion (clean modern), github (classic GitHub), minimal (elegant serif), academic (formal justified), corporate (professional blue), latex (academic paper), dracula (dark purple/pink), newspaper (editorial), handwritten (cursive notebook), terminal (green-on-black hacker), pastel (soft rounded colors).">
            <option value="notion">Notion</option>
            <option value="github">GitHub</option>
            <option value="minimal">Minimal</option>
            <option value="academic">Academic</option>
            <option value="corporate">Corporate</option>
            <option value="latex">LaTeX</option>
            <option value="dracula">Dracula</option>
            <option value="newspaper">Newspaper</option>
            <option value="handwritten">Handwritten</option>
            <option value="terminal">Terminal</option>
            <option value="pastel">Pastel</option>
        </select>
    </form>

    <form id="wmcpExport"
          toolname="export-document"
          tooldescription="Export the current markdown document to a file. Choose the format: pdf (styled continuous page), html (standalone file with styles inlined), or image (PNG screenshot)."
          toolautosubmit="true"
          hidden>
        <select name="format"
                toolparamtitle="Export Format"
                toolparamdescription="File format to export. Options: pdf, html, image.">
            <option value="pdf">PDF</option>
            <option value="html">HTML</option>
            <option value="image">Image (PNG)</option>
        </select>
    </form>

    <form id="wmcpShare"
          toolname="share-document"
          tooldescription="Generate a shareable URL for the current markdown document. The URL contains the compressed content — no server needed. Copy and share the returned link."
          toolautosubmit="true"
          hidden>
        <input type="hidden" name="action" value="share"
               toolparamtitle="Action"
               toolparamdescription="Always 'share'. Generates a link to the clipboard.">
    </form>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.5.0/lz-string.min.js"></script>

    <!-- App -->
    <script src="app.js"></script>
</body>
</html>
